<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديات اليوم – 10 تحديات يومية</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" />
    <style>
        :root {
            --md-sys-color-primary: #6750A4;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-primary-container: #EADDFF;
            --md-sys-color-on-primary-container: #21005D;
            --md-sys-color-secondary: #625B71;
            --md-sys-color-on-secondary: #FFFFFF;
            --md-sys-color-secondary-container: #E8DEF8;
            --md-sys-color-on-secondary-container: #1D192B;
            --md-sys-color-surface: #FFFBFE;
            --md-sys-color-on-surface: #1C1B1F;
            --md-sys-color-surface-variant: #E7E0EC;
            --md-sys-color-on-surface-variant: #49454F;
            --md-sys-color-outline: #79747E;
            --md-sys-color-background: #FFFBFE;
            --md-sys-color-on-background: #1C1B1F;
            --md-elevation-1: 0px 1px 2px rgba(0,0,0,0.3), 0px 1px 3px 1px rgba(0,0,0,0.15);
            --md-elevation-2: 0px 1px 2px rgba(0,0,0,0.3), 0px 2px 6px 2px rgba(0,0,0,0.15);
            --shape-corner-small: 8px;
            --shape-corner-medium: 12px;
            --shape-corner-extra-large: 28px;
        }

        [data-theme="dark"] {
            --md-sys-color-primary: #D0BCFF;
            --md-sys-color-on-primary: #381E72;
            --md-sys-color-primary-container: #4F378B;
            --md-sys-color-on-primary-container: #EADDFF;
            --md-sys-color-secondary: #CCC2DC;
            --md-sys-color-on-secondary: #332D41;
            --md-sys-color-secondary-container: #4A4458;
            --md-sys-color-on-secondary-container: #E8DEF8;
            --md-sys-color-surface: #1C1B1F;
            --md-sys-color-on-surface: #E6E1E5;
            --md-sys-color-surface-variant: #49454F;
            --md-sys-color-on-surface-variant: #CAC4D0;
            --md-sys-color-outline: #938F99;
            --md-sys-color-background: #1C1B1F;
            --md-sys-color-on-background: #E6E1E5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Roboto', 'Noto Sans Arabic', system-ui, sans-serif;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .app-container {
            max-width: 640px;
            width: 100%;
            margin: 24px auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .headline {
            font-size: 2rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--md-sys-color-on-surface);
        }

        .headline .material-symbols-outlined {
            font-size: 2rem;
            color: var(--md-sys-color-primary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .date-badge, .theme-toggle {
            background-color: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
            border: none;
            border-radius: var(--shape-corner-small);
            padding: 6px 12px;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-family: inherit;
        }

        .date-badge { cursor: default; }
        .theme-toggle:hover { filter: brightness(0.95); }

        .stats-row {
            display: flex;
            gap: 12px;
            align-items: stretch;
            flex-wrap: wrap;
        }

        .progress-section {
            flex: 2;
            min-width: 180px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: var(--md-sys-color-surface);
            padding: 12px 16px;
            border-radius: var(--shape-corner-medium);
            box-shadow: var(--md-elevation-1);
        }

        .streak-badge {
            flex: 1;
            min-width: 100px;
            background: var(--md-sys-color-tertiary-container);
            color: var(--md-sys-color-on-tertiary-container);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 16px;
            border-radius: var(--shape-corner-medium);
            box-shadow: var(--md-elevation-1);
            font-weight: 500;
            font-size: 1.1rem;
        }
        [data-theme="dark"] .streak-badge {
            background: var(--md-sys-color-tertiary-container);
            color: var(--md-sys-color-on-tertiary-container);
        }

        .streak-badge .material-symbols-outlined {
            font-size: 1.6rem;
        }

        .progress-label {
            font-size: 0.85rem;
            color: var(--md-sys-color-on-surface-variant);
            display: flex;
            justify-content: space-between;
        }

        progress {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            background-color: var(--md-sys-color-surface-variant);
        }

        progress::-webkit-progress-bar { background-color: var(--md-sys-color-surface-variant); border-radius: 4px; }
        progress::-webkit-progress-value { background-color: var(--md-sys-color-primary); border-radius: 4px; transition: width 0.3s; }
        progress::-moz-progress-bar { background-color: var(--md-sys-color-primary); border-radius: 4px; }

        .challenges-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .challenge-card {
            background-color: var(--md-sys-color-surface);
            border-radius: var(--shape-corner-medium);
            padding: 16px 16px 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--md-elevation-1);
            transition: box-shadow 0.2s, background-color 0.2s, border-color 0.2s;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .challenge-card:hover {
            box-shadow: var(--md-elevation-2);
            background-color: var(--md-sys-color-surface-variant);
            border-color: var(--md-sys-color-outline);
        }

        .challenge-card.completed {
            border-color: var(--md-sys-color-primary);
            background-color: var(--md-sys-color-primary-container);
            opacity: 0.85;
        }

        .challenge-card.completed .card-content {
            text-decoration: line-through;
            color: var(--md-sys-color-on-primary-container);
        }

        .card-index {
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            font-weight: 600;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background-color 0.2s;
        }

        .challenge-card.completed .card-index {
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
        }

        .card-content {
            flex: 1;
            font-size: 1.05rem;
            line-height: 1.5;
        }

        .card-actions { display: flex; gap: 4px; }

        .icon-btn {
            background: none;
            border: none;
            color: var(--md-sys-color-on-surface-variant);
            cursor: pointer;
            padding: 4px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s, color 0.2s;
        }

        .icon-btn:hover {
            background-color: var(--md-sys-color-surface-variant);
            color: var(--md-sys-color-on-surface);
        }

        .icon-btn .material-symbols-outlined { font-size: 1.4rem; }

        .footer-note {
            text-align: center;
            color: var(--md-sys-color-on-surface-variant);
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .fab {
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            border: none;
            border-radius: var(--shape-corner-extra-large);
            padding: 12px 24px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: var(--md-elevation-1);
            transition: background-color 0.2s, box-shadow 0.2s;
            font-family: inherit;
            margin: 0 auto;
        }

        .fab:hover {
            box-shadow: var(--md-elevation-2);
            filter: brightness(0.95);
        }
    </style>
</head>

        ];

        // دوال التوليد العشوائي بالتاريخ
        function seededRandom(seed) { let s = Math.sin(seed) * 10000; return s - Math.floor(s); }
        function shuffleArrayWithSeed(arr, seed) {
            const array = [...arr]; let currentIndex = array.length, randomIndex; let seedValue = seed;
            while (currentIndex !== 0) { seedValue++; randomIndex = Math.floor(seededRandom(seedValue) * currentIndex); currentIndex--; [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]]; }
            return array;
        }
        function getTodaySeed() { const now = new Date(); return parseInt(now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0')); }
        function getTodayChallenges() { return shuffleArrayWithSeed(allChallenges, getTodaySeed()).slice(0,10); }

        // مفتاح التخزين لكل يوم
        const storageKey = (seed) => `completed-${seed}`;
        const todaySeed = getTodaySeed();

        function loadCompleted(seed = todaySeed) { const data = localStorage.getItem(storageKey(seed)); return data ? JSON.parse(data) : []; }
        function saveCompleted(arr, seed = todaySeed) { localStorage.setItem(storageKey(seed), JSON.stringify(arr)); }

        // حساب الأيام المتتالية
        function calculateStreak() {
            let streak = 0;
            // التحقق من اليوم الحالي
            const todayCompleted = loadCompleted(todaySeed);
            if (todayCompleted.length === 10) {
                streak = 1;
            } else {
                return 0; // اليوم غير مكتمل -> لا تتابع
            }
            // فحص الأيام السابقة
            let checkDate = new Date();
            while (true) {
                checkDate.setDate(checkDate.getDate() - 1);
                const seed = parseInt(checkDate.getFullYear() + String(checkDate.getMonth()+1).padStart(2,'0') + String(checkDate.getDate()).padStart(2,'0'));
                const comp = loadCompleted(seed);
                if (comp.length === 10) {
                    streak++;
                } else {
                    break;
                }
            }
            return streak;
        }

        function updateStreakDisplay() {
            const streak = calculateStreak();
            document.getElementById('streakCount').textContent = streak;
        }

        // عرض التحديات
        function displayChallenges() {
            const challenges = getTodayChallenges();
            const completed = loadCompleted();
            const list = document.getElementById('challengeList');
            list.innerHTML = '';

            challenges.forEach((text, index) => {
                const card = document.createElement('div');
                card.className = 'challenge-card';
                if (completed.includes(index)) card.classList.add('completed');
                card.setAttribute('role', 'listitem');
                card.tabIndex = 0;
                card.innerHTML = `
                    <div class="card-index">${index+1}</div>
                    <div class="card-content">${text}</div>
                    <div class="card-actions">
                        <button class="icon-btn share-btn" aria-label="مشاركة التحدي" title="مشاركة">
                            <span class="material-symbols-outlined">share</span>
                        </button>
                    </div>
                `;

                card.addEventListener('click', (e) => {
                    if (e.target.closest('.share-btn')) return;
                    const comp = loadCompleted();
                    if (comp.includes(index)) {
                        const filtered = comp.filter(i => i !== index);
                        saveCompleted(filtered);
                        card.classList.remove('completed');
                    } else {
                        comp.push(index);
                        saveCompleted(comp);
                        card.classList.add('completed');
                    }
                    updateProgress();
                    updateStreakDisplay();
                });

                card.querySelector('.share-btn').addEventListener('click', async (e) => {
                    e.stopPropagation();
                    try {
                        await navigator.share({ title: 'تحدي اليوم', text: `تحدي اليوم: ${text}` });
                    } catch {
                        navigator.clipboard.writeText(`تحدي اليوم: ${text}`).then(() => alert('تم نسخ التحدي إلى الحافظة')).catch(() => alert('تعذرت المشاركة'));
                    }
                });

                list.appendChild(card);
            });

            updateProgress();
            updateStreakDisplay();
            updateDate();
        }

        function updateProgress() {
            const completed = loadCompleted();
            document.getElementById('completedCount').textContent = `${completed.length} / 10`;
            document.getElementById('progressBar').value = completed.length;
        }

        function updateDate() {
            const today = new Date();
            document.getElementById('dateText').textContent = today.toLocaleDateString('ar-SA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }

        // السمة الليلية
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        function setTheme(isDark) {
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            themeIcon.textContent = isDark ? 'light_mode' : 'dark_mode';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }
        const savedTheme = localStorage.getItem('theme') || 'light';
        setTheme(savedTheme === 'dark');
        themeToggle.addEventListener('click', () => setTheme(document.documentElement.getAttribute('data-theme') !== 'dark'));

        document.getElementById('refreshButton').addEventListener('click', () => location.reload());

        displayChallenges();
    </script>
