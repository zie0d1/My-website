
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debate Arena · Real NVIDIA AI</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #222;
      --alpha: #e8ff00;
      --beta: #00d4ff;
      --text: #e8e8e8;
      --muted: #555;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 860px;
      width: 100%;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-family: var(--sans);
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    header h1 span.a { color: var(--alpha); }
    header h1 span.b { color: var(--beta); }

    .sub {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 8px;
      text-transform: uppercase;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 24px;
      margin-bottom: 24px;
    }

    .card-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    input, textarea, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.85rem;
      padding: 10px 14px;
      outline: none;
      margin-bottom: 8px;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #444;
    }

    .agents-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .agent-card {
      border: 1px solid var(--border);
      padding: 16px;
      background: var(--surface);
    }

    .alpha-card { border-top: 2px solid var(--alpha); }
    .beta-card { border-top: 2px solid var(--beta); }

    .agent-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .alpha-card .agent-label { color: var(--alpha); }
    .beta-card .agent-label { color: var(--beta); }

    .api-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      align-items: flex-end;
    }

    .api-row input {
      flex: 3;
      margin-bottom: 0;
    }

    .controls-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    button {
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 10px 24px;
      border: none;
      transition: opacity 0.2s;
    }

    #btn-start {
      background: var(--alpha);
      color: #000;
    }

    #btn-stop {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      display: none;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .rounds-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.75rem;
      color: var(--muted);
    }

    #arena {
      display: none;
      flex-direction: column;
      margin-top: 10px;
    }

    .arena-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }

    #arena-topic-label {
      font-size: 0.7rem;
      color: #bbb;
      max-width: 70%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #round-indicator {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
    }

    #messages {
      max-height: 540px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .msg {
      padding: 18px 20px;
      font-size: 0.82rem;
      line-height: 1.6;
      animation: fadeIn 0.3s ease;
    }

    .msg.alpha {
      background: #111400;
      border-left: 2px solid var(--alpha);
    }

    .msg.beta {
      background: #001418;
      border-left: 2px solid var(--beta);
    }

    .msg-agent {
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .msg.alpha .msg-agent { color: var(--alpha); }
    .msg.beta .msg-agent { color: var(--beta); }

    .msg-text {
      color: #ddd;
      white-space: pre-wrap;
    }

    .typing {
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .typing.alpha { background: #111400; border-left: 2px solid var(--alpha); }
    .typing.beta { background: #001418; border-left: 2px solid var(--beta); }

    .typing-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      color: var(--muted);
    }

    .dots {
      display: flex;
      gap: 5px;
    }

    .dots i {
      width: 5px;
      height: 5px;
      background: #777;
      border-radius: 50%;
      display: block;
      animation: pulse 1s infinite;
    }

    .dots i:nth-child(2) { animation-delay: 0.2s; }
    .dots i:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #error-msg {
      background: #1a0303;
      border: 1px solid #ff5555;
      color: #ff8888;
      padding: 12px;
      font-size: 0.75rem;
      display: none;
      margin-bottom: 16px;
    }

    #status-bar {
      font-size: 0.65rem;
      text-align: center;
      color: var(--muted);
      padding-top: 16px;
      margin-top: 16px;
      border-top: 1px solid var(--border);
      display: none;
    }

    #status-bar.visible { display: block; }

    @media (max-width: 640px) {
      .agents-grid { grid-template-columns: 1fr; }
      .arena-header { flex-direction: column; }
      #arena-topic-label { white-space: normal; max-width: 100%; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1><span class="a">DE</span><span class="b">BA</span>TE</h1>
    <div class="sub">NVIDIA AI · openai/gpt-oss-20b · real-time arguments</div>
  </header>

  <div class="card">
    <div class="card-label">🗣️ Debate Topic</div>
    <input type="text" id="topic" value="Artificial general intelligence will be achieved by 2030" placeholder="e.g. AI safety cannot be guaranteed">
  </div>

  <div class="agents-grid">
    <div class="agent-card alpha-card">
      <div class="agent-label">◈ AGENT ALPHA</div>
      <input type="text" id="alpha-name" value="Dr. Sterling">
      <textarea id="alpha-persona" rows="2">Pragmatic rationalist, data-driven, focuses on empirical evidence and incentives.</textarea>
      <select id="alpha-stance">
        <option value="FOR">Stance: FOR</option>
        <option value="AGAINST">Stance: AGAINST</option>
      </select>
    </div>
    <div class="agent-card beta-card">
      <div class="agent-label">◈ AGENT BETA</div>
      <input type="text" id="beta-name" value="Prof. Vesper">
      <textarea id="beta-persona" rows="2">Philosophical idealist, questions assumptions, focuses on ethics and human values.</textarea>
      <select id="beta-stance">
        <option value="AGAINST" selected>Stance: AGAINST</option>
        <option value="FOR">Stance: FOR</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="card-label">🔑 NVIDIA API (your key)</div>
    <div class="api-row">
      <input type="text" id="api-key" value="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" placeholder="nvapi-...">
    </div>
  </div>

  <div class="controls-row">
    <button id="btn-start">⚡ INITIATE DEBATE</button>
    <button id="btn-stop">■ STOP</button>
    <div class="rounds-wrap">
      Rounds
      <input type="range" id="rounds-slider" min="2" max="8" value="4">
      <span id="rounds-display">4</span>
    </div>
  </div>

  <div id="error-msg"></div>

  <div id="arena">
    <div class="arena-header">
      <span id="arena-topic-label"></span>
      <span id="round-indicator">—</span>
    </div>
    <div id="messages"></div>
    <div id="status-bar"></div>
  </div>
</div>

<script>
  // ---------- REAL NVIDIA AI INTEGRATION ----------
  let activeAbortController = null;
  let stopFlag = false;

  const nvidiaEndpoint = "https://integrate.api.nvidia.com/v1/chat/completions";

  async function callNvidiaAI(systemPrompt, conversationHistory, apiKey, model = "openai/gpt-oss-20b") {
    // conversationHistory: array of { role, content }
    const messages = [
      { role: "system", content: systemPrompt },
      ...conversationHistory
    ];

    const response = await fetch(nvidiaEndpoint, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: model,
        messages: messages,
        temperature: 0.75,
        top_p: 0.95,
        max_tokens: 280,
        stream: false
      })
    });

    if (!response.ok) {
      const errorText = await response.text();
      throw new Error(`NVIDIA API error (${response.status}): ${errorText.substring(0, 200)}`);
    }

    const data = await response.json();
    const content = data.choices?.[0]?.message?.content;
    if (!content) throw new Error("Empty response from AI");
    return content.trim();
  }

  // UI helpers
  function showTyping(side, name) {
    removeTyping();
    const el = document.createElement("div");
    el.className = `typing ${side}`;
    el.id = "typing-indicator";
    el.innerHTML = `<span class="typing-label">${name}</span><div class="dots"><i></i><i></i><i></i></div>`;
    document.getElementById("messages").appendChild(el);
    el.scrollIntoView({ behavior: "smooth", block: "end" });
  }

  function removeTyping() {
    const old = document.getElementById("typing-indicator");
    if (old) old.remove();
  }

  function appendMessage(side, name, text) {
    removeTyping();
    const div = document.createElement("div");
    div.className = `msg ${side}`;
    div.innerHTML = `<div class="msg-agent">${escapeHtml(name)}</div><div class="msg-text">${escapeHtml(text)}</div>`;
    document.getElementById("messages").appendChild(div);
    div.scrollIntoView({ behavior: "smooth", block: "end" });
  }

  function setStatus(text) {
    const bar = document.getElementById("status-bar");
    bar.textContent = text;
    bar.classList.toggle("visible", !!text);
  }

  function showError(msg) {
    const errDiv = document.getElementById("error-msg");
    errDiv.textContent = msg;
    errDiv.style.display = "block";
    setTimeout(() => {
      if (errDiv.style.display === "block") errDiv.style.display = "none";
    }, 7000);
  }

  function hideError() {
    document.getElementById("error-msg").style.display = "none";
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  function stopDebate() {
    stopFlag = true;
    if (activeAbortController) {
      activeAbortController.abort();
      activeAbortController = null;
    }
    setStatus("⏹️ Debate stopped by user.");
  }

  async function startDebate() {
    // get values
    const topic = document.getElementById("topic").value.trim();
    if (!topic) { showError("Please enter a debate topic."); return; }
    const apiKey = document.getElementById("api-key").value.trim();
    if (!apiKey) { showError("Please enter your NVIDIA API key."); return; }

    const alphaName = document.getElementById("alpha-name").value.trim() || "Agent Alpha";
    const alphaPersona = document.getElementById("alpha-persona").value.trim();
    const alphaStance = document.getElementById("alpha-stance").value;
    const betaName = document.getElementById("beta-name").value.trim() || "Agent Beta";
    const betaPersona = document.getElementById("beta-persona").value.trim();
    const betaStance = document.getElementById("beta-stance").value;
    const rounds = parseInt(document.getElementById("rounds-slider").value);

    stopFlag = false;
    if (activeAbortController) activeAbortController.abort();
    activeAbortController = new AbortController();

    // clear UI
    document.getElementById("messages").innerHTML = "";
    document.getElementById("arena").style.display = "flex";
    document.getElementById("arena-topic-label").innerHTML = `“${escapeHtml(topic)}”`;
    document.getElementById("round-indicator").innerHTML = "—";
    hideError();
    setStatus("Connecting to NVIDIA AI ...");

    // enable/disable buttons
    const startBtn = document.getElementById("btn-start");
    const stopBtn = document.getElementById("btn-stop");
    startBtn.disabled = true;
    stopBtn.style.display = "inline-block";

    // Build system prompts
    const alphaSystem = `You are ${alphaName}. ${alphaPersona}
You are debating the topic: "${topic}"
Your fixed stance is ${alphaStance} this topic. Never waver or concede ground.
Keep responses concise (max 90 words). Be incisive and directly counter your opponent.
Write in flowing prose, no bullet points.`;

    const betaSystem = `You are ${betaName}. ${betaPersona}
You are debating the topic: "${topic}"
Your fixed stance is ${betaStance} this topic. Never waver or concede ground.
Keep responses concise (max 90 words). Be incisive and directly counter your opponent.
Write in flowing prose, no bullet points.`;

    let alphaHistory = []; // OpenAI format messages (user/assistant)
    let betaHistory = [];

    try {
      for (let r = 0; r < rounds; r++) {
        if (stopFlag) break;

        document.getElementById("round-indicator").innerHTML = `Round ${r+1} / ${rounds}`;

        // ----- ALPHA TURN -----
        setStatus(`${alphaName} is formulating argument ...`);
        showTyping("alpha", alphaName);

        let alphaUserPrompt;
        if (r === 0) {
          alphaUserPrompt = `Open the debate on: "${topic}". State your opening argument clearly.`;
        } else {
          const lastBetaReply = betaHistory[betaHistory.length-1]?.content || "No previous argument";
          alphaUserPrompt = `${betaName} argued: "${lastBetaReply}"\n\nRespond and counter directly. Defend your stance.`;
        }

        alphaHistory.push({ role: "user", content: alphaUserPrompt });
        const alphaReply = await callNvidiaAI(alphaSystem, alphaHistory, apiKey);
        if (stopFlag) { removeTyping(); break; }
        alphaHistory.push({ role: "assistant", content: alphaReply });
        appendMessage("alpha", alphaName, alphaReply);

        if (stopFlag) break;

        // ----- BETA TURN -----
        setStatus(`${betaName} is formulating counter‑argument ...`);
        showTyping("beta", betaName);

        let betaUserPrompt;
        if (r === 0) {
          betaUserPrompt = `${alphaName} opened with: "${alphaReply}"\n\nRespond and present your opening counter‑argument.`;
        } else {
          betaUserPrompt = `${alphaName} argued: "${alphaReply}"\n\nRespond directly and counter their points.`;
        }

        betaHistory.push({ role: "user", content: betaUserPrompt });
        const betaReply = await callNvidiaAI(betaSystem, betaHistory, apiKey);
        if (stopFlag) { removeTyping(); break; }
        betaHistory.push({ role: "assistant", content: betaReply });
        appendMessage("beta", betaName, betaReply);
      }

      if (!stopFlag) {
        setStatus("✅ Debate concluded.");
      } else {
        setStatus("⏹️ Debate stopped early.");
      }
    } catch (err) {
      if (err.name === "AbortError") {
        setStatus("Debate aborted.");
      } else {
        console.error(err);
        showError(`AI call failed: ${err.message}. Check API key or network.`);
        setStatus("Error — debate stopped.");
      }
    } finally {
      startBtn.disabled = false;
      stopBtn.style.display = "none";
      activeAbortController = null;
      removeTyping();
    }
  }

  // attach event listeners
  document.getElementById("btn-start").onclick = startDebate;
  document.getElementById("btn-stop").onclick = stopDebate;
  const slider = document.getElementById("rounds-slider");
  const roundsDisplay = document.getElementById("rounds-display");
  slider.oninput = () => { roundsDisplay.textContent = slider.value; };
  roundsDisplay.textContent = slider.value;
</script>
</body>
</html>
