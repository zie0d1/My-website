<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker — تتبّع</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #666;
    --accent: #c8f538;
    --accent2: #38f5c8;
    --danger: #f53838;
    --radius: 16px;
    --font: 'IBM Plex Sans Arabic', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,245,56,0.04) 0%, transparent 70%);
    top: -200px; left: -200px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    max-width: 680px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 48px;
    animation: fadeUp 0.6s ease both;
  }

  .header-left h1 {
    font-size: 2rem;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .header-left .subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 4px;
    font-family: var(--mono);
    direction: ltr;
    text-align: right;
  }

  .date-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 100px;
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--muted);
    direction: ltr;
    white-space: nowrap;
  }

  /* Progress ring summary */
  .summary-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 24px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .ring-wrap {
    flex-shrink: 0;
    position: relative;
    width: 64px; height: 64px;
  }

  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-track { stroke: var(--border); }
  .ring-fill {
    stroke: var(--accent);
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s ease;
  }

  .ring-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--accent);
  }

  .summary-info { flex: 1; }
  .summary-info .sum-title {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }
  .summary-info .sum-sub {
    font-size: 0.82rem;
    color: var(--muted);
  }

  .streak-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(200,245,56,0.08);
    border: 1px solid rgba(200,245,56,0.2);
    border-radius: 100px;
    padding: 6px 12px;
    font-size: 0.82rem;
    color: var(--accent);
    font-family: var(--mono);
    flex-shrink: 0;
  }

  /* Add item */
  .add-section {
    margin-bottom: 28px;
    animation: fadeUp 0.6s 0.15s ease both;
  }

  .add-row {
    display: flex;
    gap: 10px;
  }

  .add-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text);
    font-family: var(--font);
    font-size: 0.92rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    direction: rtl;
  }
  .add-input::placeholder { color: var(--muted); }
  .add-input:focus {
    border-color: rgba(200,245,56,0.4);
    box-shadow: 0 0 0 3px rgba(200,245,56,0.06);
  }

  .category-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 14px;
    color: var(--text);
    font-family: var(--font);
    font-size: 0.85rem;
    outline: none;
    cursor: pointer;
    direction: rtl;
    transition: border-color 0.2s;
  }
  .category-select:focus { border-color: rgba(200,245,56,0.4); }
  .category-select option { background: var(--surface2); }

  .add-btn {
    background: var(--accent);
    color: #0d0d0d;
    border: none;
    border-radius: 12px;
    padding: 14px 20px;
    font-family: var(--font);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    line-height: 1;
    flex-shrink: 0;
  }
  .add-btn:hover { opacity: 0.88; transform: scale(0.97); }
  .add-btn:active { transform: scale(0.94); }

  /* Filters */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    animation: fadeUp 0.6s 0.2s ease both;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px;
    font-family: var(--font);
    font-size: 0.82rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { color: var(--text); border-color: #444; }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d0d0d;
    font-weight: 500;
  }

  /* Task list */
  .task-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: fadeUp 0.6s 0.25s ease both;
  }

  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .task-item::before {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 3px;
    background: transparent;
    transition: background 0.2s;
  }

  .task-item:hover { border-color: #333; transform: translateX(-2px); }
  .task-item.done { opacity: 0.55; }
  .task-item.done .task-name { text-decoration: line-through; color: var(--muted); }
  .task-item.done::before { background: var(--accent); }

  /* Category color left border */
  .task-item[data-cat="صحة"]::before { background: #38f5c8; }
  .task-item[data-cat="عمل"]::before { background: #5b8af5; }
  .task-item[data-cat="تعلّم"]::before { background: #f5c038; }
  .task-item[data-cat="رياضة"]::before { background: #f5386c; }
  .task-item[data-cat="عادة"]::before { background: var(--accent); }
  .task-item.done::before { background: #444 !important; }

  .task-check {
    width: 22px; height: 22px;
    border: 2px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: transparent;
  }
  .task-check:hover { border-color: var(--accent); }
  .task-item.done .task-check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .task-check svg { opacity: 0; transition: opacity 0.15s; }
  .task-item.done .task-check svg { opacity: 1; }

  .task-info { flex: 1; min-width: 0; }
  .task-name {
    font-size: 0.92rem;
    font-weight: 400;
    color: var(--text);
    transition: color 0.2s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }

  .cat-tag {
    font-size: 0.72rem;
    font-family: var(--mono);
    color: var(--muted);
    background: var(--surface2);
    border-radius: 4px;
    padding: 2px 6px;
  }

  .task-time {
    font-size: 0.72rem;
    font-family: var(--mono);
    color: var(--muted);
    direction: ltr;
  }

  .task-count {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .count-btn {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    line-height: 1;
  }
  .count-btn:hover { border-color: var(--accent); color: var(--accent); }

  .count-num {
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--text);
    min-width: 20px;
    text-align: center;
  }

  .delete-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    opacity: 0;
    flex-shrink: 0;
  }
  .task-item:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: var(--danger); background: rgba(245,56,56,0.1); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }
  .empty-state p { font-size: 0.88rem; }

  /* Week heatmap */
  .week-section {
    margin-top: 40px;
    animation: fadeUp 0.6s 0.3s ease both;
  }
  .section-label {
    font-size: 0.78rem;
    font-family: var(--mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
    direction: ltr;
  }
  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  .day-cell {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    gap: 4px;
    cursor: default;
    position: relative;
    border: 1px solid var(--border);
    background: var(--surface);
    transition: transform 0.15s;
  }
  .day-cell:hover { transform: scale(1.05); }
  .day-cell .day-name { color: var(--muted); font-family: var(--mono); font-size: 0.65rem; }
  .day-cell .day-num { font-weight: 600; font-size: 0.82rem; }
  .day-cell.today {
    border-color: rgba(200,245,56,0.4);
    background: rgba(200,245,56,0.06);
  }
  .day-cell.today .day-num { color: var(--accent); }
  .day-cell .day-dots {
    display: flex;
    gap: 2px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 30px;
  }
  .day-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.6;
  }

  /* Stats footer */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 16px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .stat-num {
    font-family: var(--mono);
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--accent);
    display: block;
  }
  .stat-label {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .task-item.new-item {
    animation: slideIn 0.3s ease both;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>تتبّع</h1>
      <div class="subtitle" id="dateStr">—</div>
    </div>
    <div class="date-badge" id="todayDate">—</div>
  </div>

  <!-- Summary -->
  <div class="summary-bar">
    <div class="ring-wrap">
      <svg width="64" height="64" viewBox="0 0 64 64">
        <circle class="ring-track" cx="32" cy="32" r="26" fill="none" stroke-width="4"/>
        <circle class="ring-fill" id="ringFill" cx="32" cy="32" r="26" fill="none" stroke-width="4"
          stroke-dasharray="163.4" stroke-dashoffset="163.4"/>
      </svg>
      <div class="ring-label" id="ringPct">0%</div>
    </div>
    <div class="summary-info">
      <div class="sum-title" id="sumTitle">لا توجد مهام اليوم</div>
      <div class="sum-sub" id="sumSub">أضف مهمتك الأولى ↑</div>
    </div>
    <div class="streak-badge">
      🔥 <span id="streakNum">0</span> يوم
    </div>
  </div>

  <!-- Add -->
  <div class="add-section">
    <div class="add-row">
      <input class="add-input" id="taskInput" type="text" placeholder="مهمة جديدة…" maxlength="80">
      <select class="category-select" id="catSelect">
        <option value="عادة">عادة</option>
        <option value="صحة">صحة</option>
        <option value="عمل">عمل</option>
        <option value="تعلّم">تعلّم</option>
        <option value="رياضة">رياضة</option>
      </select>
      <button class="add-btn" onclick="addTask()">+</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">الكل</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">قيد التنفيذ</button>
    <button class="filter-btn" onclick="setFilter('done', this)">مكتملة</button>
    <button class="filter-btn" onclick="setFilter('عادة', this)">عادة</button>
    <button class="filter-btn" onclick="setFilter('صحة', this)">صحة</button>
    <button class="filter-btn" onclick="setFilter('عمل', this)">عمل</button>
    <button class="filter-btn" onclick="setFilter('تعلّم', this)">تعلّم</button>
    <button class="filter-btn" onclick="setFilter('رياضة', this)">رياضة</button>
  </div>

  <!-- Task List -->
  <div class="task-list" id="taskList"></div>

  <!-- Week -->
  <div class="week-section">
    <div class="section-label">هذا الأسبوع</div>
    <div class="week-grid" id="weekGrid"></div>
    <div class="stats-row">
      <div class="stat-card">
        <span class="stat-num" id="statTotal">0</span>
        <div class="stat-label">إجمالي المهام</div>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="statDone">0</span>
        <div class="stat-label">مكتملة اليوم</div>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="statStreak">0</span>
        <div class="stat-label">أيام متواصلة</div>
      </div>
    </div>
  </div>

</div>

<script>
const DAYS_AR = ['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];
const MONTHS_AR = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

let tasks = JSON.parse(localStorage.getItem('tracker_tasks') || '[]');
let history = JSON.parse(localStorage.getItem('tracker_history') || '{}');
let currentFilter = 'all';

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function save() {
  localStorage.setItem('tracker_tasks', JSON.stringify(tasks));
  localStorage.setItem('tracker_history', JSON.stringify(history));
}

function addTask() {
  const input = document.getElementById('taskInput');
  const cat = document.getElementById('catSelect').value;
  const name = input.value.trim();
  if (!name) return;

  const task = {
    id: Date.now(),
    name,
    cat,
    done: false,
    count: 1,
    createdAt: new Date().toISOString()
  };
  tasks.unshift(task);
  save();
  input.value = '';
  render(true);
}

document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

function toggleTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  task.done = !task.done;
  updateHistory();
  save();
  render();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  updateHistory();
  save();
  render();
}

function changeCount(id, delta) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  task.count = Math.max(1, (task.count || 1) + delta);
  save();
  render();
}

function updateHistory() {
  const key = todayKey();
  const done = tasks.filter(t => t.done).length;
  const total = tasks.length;
  history[key] = { done, total, pct: total ? Math.round(done/total*100) : 0 };
  save();
}

function calcStreak() {
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 30; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const h = history[key];
    if (h && h.pct >= 50) streak++;
    else if (i > 0) break;
  }
  return streak;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function getFiltered() {
  return tasks.filter(t => {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'done') return t.done;
    if (currentFilter === 'pending') return !t.done;
    return t.cat === currentFilter;
  });
}

function render(newItem = false) {
  // Date
  const now = new Date();
  document.getElementById('todayDate').textContent =
    `${now.getDate()} ${MONTHS_AR[now.getMonth()]} ${now.getFullYear()}`;
  document.getElementById('dateStr').textContent =
    `${DAYS_AR[now.getDay()]}`;

  // Summary
  const total = tasks.length;
  const done = tasks.filter(t => t.done).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  const circ = 163.4;
  document.getElementById('ringFill').style.strokeDashoffset = circ - (circ * pct / 100);
  document.getElementById('ringPct').textContent = pct + '%';
  document.getElementById('sumTitle').textContent = total
    ? `${done} من ${total} مهمة مكتملة`
    : 'لا توجد مهام اليوم';
  document.getElementById('sumSub').textContent = total
    ? (pct === 100 ? '🎉 أنجزت كل شيء اليوم!' : `تبقّى ${total - done} مهمة`)
    : 'أضف مهمتك الأولى ↑';

  const streak = calcStreak();
  document.getElementById('streakNum').textContent = streak;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statStreak').textContent = streak;

  updateHistory();

  // Task list
  const list = document.getElementById('taskList');
  const filtered = getFiltered();

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">○</div>
      <p>${currentFilter === 'all' ? 'لا توجد مهام، أضف واحدة!' : 'لا يوجد شيء هنا'}</p>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map((t, i) => `
    <div class="task-item ${t.done ? 'done' : ''} ${newItem && i === 0 ? 'new-item' : ''}"
         data-cat="${t.cat}"
         style="${newItem && i===0 ? '' : ''}">
      <div class="task-check" onclick="toggleTask(${t.id})">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M2 6l3 3 5-5" stroke="#0d0d0d" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="task-info">
        <div class="task-name">${t.name}</div>
        <div class="task-meta">
          <span class="cat-tag">${t.cat}</span>
          <span class="task-time">${new Date(t.createdAt).toLocaleTimeString('ar', {hour:'2-digit', minute:'2-digit'})}</span>
        </div>
      </div>
      <div class="task-count">
        <button class="count-btn" onclick="changeCount(${t.id}, -1)">−</button>
        <span class="count-num">${t.count || 1}×</span>
        <button class="count-btn" onclick="changeCount(${t.id}, 1)">+</button>
      </div>
      <button class="delete-btn" onclick="deleteTask(${t.id})">×</button>
    </div>
  `).join('');

  // Week
  renderWeek();
}

function renderWeek() {
  const grid = document.getElementById('weekGrid');
  const now = new Date();
  const dayOfWeek = now.getDay();
  const cells = [];

  for (let i = 6; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const isToday = i === 0;
    const h = history[key];
    const dots = h ? Math.min(5, Math.round(h.pct / 20)) : 0;

    cells.push(`
      <div class="day-cell ${isToday ? 'today' : ''}">
        <div class="day-name">${DAYS_AR[d.getDay()].slice(0,3)}</div>
        <div class="day-num">${d.getDate()}</div>
        <div class="day-dots">
          ${Array(dots).fill('<div class="day-dot"></div>').join('')}
        </div>
      </div>
    `);
  }
  grid.innerHTML = cells.join('');
}

// Init
render();
</script>
</body>
</html>
