<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Veterinary Slides Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --bg:#0F0F11;
    --panel:#16161a;
    --panel-2:#1c1c22;
    --border:#26262d;
    --text:#e8e8ec;
    --muted:#8a8a95;
    --accent:#7aa7ff;
    --accent-2:#9d8bff;
    --danger:#ff6b6b;
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body.rtl{font-family:'Cairo','Inter',sans-serif;direction:rtl}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit}
  a{color:var(--accent)}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(15,15,17,.85);backdrop-filter:blur(10px);z-index:10}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.2px}
  .brand-dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2))}
  .topbar-actions{display:flex;gap:8px;align-items:center}
  .btn{padding:9px 14px;border-radius:10px;background:var(--panel-2);color:var(--text);border:1px solid var(--border);font-size:13px;font-weight:500;transition:.15s;display:inline-flex;align-items:center;gap:6px}
  .btn:hover{background:#23232b;border-color:#34343d}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#0b0b10;border:none;font-weight:600}
  .btn-primary:hover{filter:brightness(1.08)}
  .btn-ghost{background:transparent}
  .btn-danger{background:transparent;color:var(--danger);border-color:#3a2226}
  .seg{display:inline-flex;background:var(--panel-2);border:1px solid var(--border);border-radius:10px;padding:3px;gap:2px}
  .seg button{padding:6px 12px;border-radius:7px;font-size:12.5px;color:var(--muted);font-weight:500}
  .seg button.active{background:#2b2b34;color:var(--text)}

  /* Home */
  .home{min-height:calc(100vh - 65px);display:flex;align-items:center;justify-content:center;padding:32px}
  .home-card{width:100%;max-width:560px;text-align:center}
  .home h1{font-size:34px;font-weight:700;margin:0 0 10px;letter-spacing:-.02em}
  .home p.lead{color:var(--muted);margin:0 0 28px;font-size:15px;line-height:1.6}
  .input-row{display:flex;gap:8px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:6px;align-items:center}
  .input-row input{flex:1;background:transparent;border:none;outline:none;color:var(--text);padding:12px 14px;font-size:15px}
  .home-options{display:flex;justify-content:center;gap:10px;margin-top:18px;flex-wrap:wrap}
  .err{margin-top:18px;padding:12px 14px;background:#2a1418;border:1px solid #4a1f25;color:#ffb3b9;border-radius:10px;font-size:13.5px;text-align:left}
  body.rtl .err{text-align:right}
  .saved-link{margin-top:24px;color:var(--muted);font-size:13px}
  .saved-link button{text-decoration:underline;color:var(--accent)}

  /* Loading */
  .loading-wrap{min-height:calc(100vh - 65px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:30px}
  .spinner{width:38px;height:38px;border:3px solid #2a2a32;border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-wrap .step{color:var(--muted);font-size:13px;text-align:center;max-width:420px}
  .progress-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;max-width:380px;width:100%;margin-top:6px}
  .progress-cell{height:7px;border-radius:4px;background:var(--panel-2);border:1px solid var(--border);transition:.25s}
  .progress-cell.done{background:linear-gradient(90deg,var(--accent),var(--accent-2));border-color:transparent}
  .progress-cell.active{background:var(--accent);border-color:transparent;animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{50%{opacity:.45}}

  /* Editor */
  .editor{display:grid;grid-template-columns:260px 1fr;gap:0;min-height:calc(100vh - 65px)}
  body.rtl .editor{grid-template-columns:1fr 260px}
  .sidebar{border-right:1px solid var(--border);padding:14px;overflow-y:auto;max-height:calc(100vh - 65px);position:sticky;top:65px}
  body.rtl .sidebar{border-right:none;border-left:1px solid var(--border)}
  .sidebar h3{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:6px 4px 12px;font-weight:600}
  .slide-item{padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:10px;margin-bottom:4px;border:1px solid transparent}
  .slide-item:hover{background:var(--panel-2);color:var(--text)}
  .slide-item.active{background:var(--panel-2);color:var(--text);border-color:var(--border)}
  .slide-item .num{width:22px;height:22px;border-radius:6px;background:#262630;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
  .slide-item.active .num{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#0b0b10}
  .slide-item .label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .canvas-wrap{padding:28px;display:flex;flex-direction:column;align-items:center;gap:18px}
  .canvas-toolbar{display:flex;gap:8px;align-items:center;width:100%;max-width:520px;justify-content:space-between;flex-wrap:wrap}
  .canvas-toolbar .left{display:flex;gap:8px;align-items:center}
  .canvas-toolbar .right{display:flex;gap:8px;align-items:center}

  /* Slide 4:5 */
  .slide{
    width:min(540px,92vw);
    aspect-ratio:4/5;
    border-radius:0;
    background:
      radial-gradient(120% 80% at 100% 0%, rgba(255,255,255,.10), transparent 60%),
      radial-gradient(100% 70% at 0% 100%, rgba(0,0,0,.35), transparent 55%),
      linear-gradient(155deg,var(--s1,#1e3a5f) 0%, var(--s2,#0c2340) 100%);
    color:#fff;
    padding:46px 40px 78px;
    display:flex;flex-direction:column;
    position:relative;overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.06);
    font-family:'Inter',sans-serif;
  }
  body.rtl .slide{font-family:'Cairo','Inter',sans-serif}
  .slide.cover{justify-content:center;align-items:flex-start;text-align:left;padding-top:60px}
  body.rtl .slide.cover{align-items:flex-end;text-align:right}
  .slide .accent-bar{position:absolute;top:0;left:0;width:100%;height:5px;background:linear-gradient(90deg, rgba(255,255,255,.7), rgba(255,255,255,.1));}
  body.rtl .slide .accent-bar{background:linear-gradient(270deg, rgba(255,255,255,.7), rgba(255,255,255,.1));}
  .slide .slide-num{position:absolute;top:22px;right:28px;font-size:64px;font-weight:800;line-height:1;opacity:.10;letter-spacing:-.04em;font-family:'Inter',sans-serif}
  body.rtl .slide .slide-num{right:auto;left:28px}
  .slide .kicker{display:inline-flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.2em;text-transform:uppercase;opacity:.85;margin-bottom:18px;font-weight:700;padding:6px 12px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);border-radius:999px;align-self:flex-start}
  body.rtl .slide .kicker{align-self:flex-end}
  .slide h2.s-title{font-size:30px;line-height:1.2;margin:0 0 16px;font-weight:700;letter-spacing:-.015em}
  .slide.cover h2.s-title{font-size:40px;line-height:1.12}
  .slide .title-underline{width:48px;height:3px;background:#fff;opacity:.85;margin:0 0 18px;border-radius:2px}
  body.rtl .slide .title-underline{margin-left:auto}
  .slide .s-body{font-size:15px;line-height:1.65;opacity:.94;white-space:pre-wrap}
  .slide.cover .s-body{font-size:14.5px;line-height:1.7;opacity:.88;max-width:95%}
  .slide ul.s-list{margin:4px 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:10px}
  .slide ul.s-list li{position:relative;padding:10px 14px 10px 34px;font-size:14px;line-height:1.5;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);border-radius:10px;backdrop-filter:blur(4px)}
  body.rtl .slide ul.s-list li{padding:10px 34px 10px 14px}
  .slide ul.s-list li::before{content:"";position:absolute;left:14px;top:50%;transform:translateY(-50%);width:8px;height:8px;border-radius:50%;background:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.15)}
  body.rtl .slide ul.s-list li::before{left:auto;right:14px}
  .slide .footer-bar{position:absolute;bottom:20px;left:40px;right:40px;display:flex;justify-content:space-between;align-items:center;font-size:11px;opacity:.6;letter-spacing:.1em;border-top:1px solid rgba(255,255,255,.15);padding-top:12px;font-weight:500}
  .slide .deco{position:absolute;top:-100px;right:-100px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle, rgba(255,255,255,.08), transparent 70%);pointer-events:none}
  body.rtl .slide .deco{right:auto;left:-100px}
  .slide .deco-2{position:absolute;bottom:-60px;left:-60px;width:180px;height:180px;border-radius:50%;border:1px solid rgba(255,255,255,.08);pointer-events:none}
  body.rtl .slide .deco-2{left:auto;right:-60px}
  /* Mixed Arabic + English scientific terms */
  body.rtl .slide [data-sci], body.rtl .slide em.sci{font-family:'Inter',sans-serif;font-style:normal;direction:ltr;display:inline-block;unicode-bidi:isolate}

  .empty-state{color:var(--muted);font-size:13px;text-align:center;padding:30px 10px}

  /* Projects modal */
  .modal-back{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;width:100%;max-width:560px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column}
  .modal header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .modal header h3{margin:0;font-size:15px;font-weight:600}
  .modal .body{padding:8px;overflow-y:auto}
  .proj-item{padding:12px 14px;border-radius:10px;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .proj-item:hover{background:var(--panel-2)}
  .proj-item .meta{font-size:12px;color:var(--muted);margin-top:3px}
  .proj-item .title{font-size:14px;font-weight:500}

  @media (max-width:760px){
    .editor{grid-template-columns:1fr}
    body.rtl .editor{grid-template-columns:1fr}
    .sidebar{position:static;max-height:none;border-right:none;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;gap:6px;padding:10px}
    body.rtl .sidebar{border-left:none;border-bottom:1px solid var(--border)}
    .sidebar h3{display:none}
    .slide-item{flex-shrink:0;margin:0}
    .slide-item .label{display:none}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="brand-dot"></span><span id="brandName">VetSlides</span></div>
  <div class="topbar-actions">
    <div class="seg" id="modeSeg" style="display:none">
      <button data-mode="simple" class="active" data-i18n="simple">Simple</button>
      <button data-mode="scientific" data-i18n="scientific">Scientific</button>
    </div>
    <div class="seg" id="langSeg">
      <button data-lang="en" class="active">EN</button>
      <button data-lang="ar">عربي</button>
    </div>
    <button class="btn btn-ghost" id="newBtn" style="display:none" data-i18n="new">New</button>
  </div>
</div>

<!-- Home -->
<section id="homeView" class="home">
  <div class="home-card">
    <h1 data-i18n="homeTitle">Veterinary Slide Generator</h1>
    <p class="lead" data-i18n="homeLead">Enter an animal disease name to generate a 10-slide educational deck.</p>
    <div class="input-row">
      <input id="diseaseInput" type="text" autocomplete="off" />
      <button class="btn btn-primary" id="generateBtn" data-i18n="generate">Generate</button>
    </div>
    <div class="home-options">
      <span style="color:var(--muted);font-size:13px;align-self:center" data-i18n="modeLabel">Mode:</span>
      <div class="seg" id="modeSegHome">
        <button data-mode="simple" class="active" data-i18n="simple">Simple</button>
        <button data-mode="scientific" data-i18n="scientific">Scientific</button>
      </div>
    </div>
    <div id="errorBox" class="err" style="display:none"></div>
    <div class="saved-link"><button id="openProjects" data-i18n="openSaved">View saved projects</button></div>
  </div>
</section>

<!-- Loading -->
<section id="loadingView" class="loading-wrap" style="display:none">
  <div class="spinner"></div>
  <div data-i18n="generating">Generating slides…</div>
  <div class="progress-grid" id="progressGrid"></div>
  <div class="step" id="loadStep"></div>
</section>

<!-- Editor -->
<section id="editorView" class="editor" style="display:none">
  <aside class="sidebar">
    <h3 data-i18n="slidesLabel">Slides</h3>
    <div id="slideList"></div>
  </aside>
  <div class="canvas-wrap">
    <div class="canvas-toolbar">
      <div class="left">
        <button class="btn" id="prevBtn">‹</button>
        <span style="font-size:13px;color:var(--muted)" id="slideCounter"></span>
        <button class="btn" id="nextBtn">›</button>
      </div>
      <div class="right">
        <button class="btn" id="exportBtn" data-i18n="exportPng">Export PNG</button>
      </div>
    </div>
    <div id="slideContainer"></div>
    <div style="font-size:12px;color:var(--muted);max-width:520px;text-align:center" data-i18n="disclaimer">
      Educational content generated by AI. Verify with veterinary references before clinical use.
    </div>
  </div>
</section>

<script>
/* =========================
   i18n
========================= */
const I18N = {
  en:{
    brand:"VetSlides", homeTitle:"Veterinary Slide Generator",
    homeLead:"Enter an animal disease name to generate a 10-slide educational deck.",
    generate:"Generate", simple:"Simple", scientific:"Scientific", new:"New",
    modeLabel:"Mode:", openSaved:"View saved projects",
    generating:"Generating slides…", slidesLabel:"Slides",
    exportPng:"Export PNG",
    disclaimer:"Educational content generated by AI. Verify with veterinary references before clinical use.",
    placeholder:"e.g. Canine Parvovirus",
    errEmpty:"Please enter a disease name.",
    errApi:"Failed to generate slides. Please check your connection and try again.",
    errParse:"The model returned an unexpected response. Please try again.",
    savedProjects:"Saved Projects", noProjects:"No saved projects yet.",
    open:"Open", delete:"Delete", close:"Close",
    step1:"Planning the deck…", step2:"Generating slide", step3:"Finalizing…", stepOf:"of",
    slideNames:["Title","Overview","Etiology","Transmission","Symptoms","Pathogenesis","Diagnosis","Treatment","Prevention","Quick Facts"]
  },
  ar:{
    brand:"VetSlides", homeTitle:"مولّد شرائح بيطرية",
    homeLead:"أدخل اسم مرض حيواني لتوليد عرض تعليمي من 10 شرائح.",
    generate:"توليد", simple:"مبسّط", scientific:"علمي", new:"جديد",
    modeLabel:"الوضع:", openSaved:"عرض المشاريع المحفوظة",
    generating:"جارٍ توليد الشرائح…", slidesLabel:"الشرائح",
    exportPng:"تصدير PNG",
    disclaimer:"محتوى تعليمي مولَّد بالذكاء الاصطناعي. يُرجى التحقق من المراجع البيطرية قبل أي استخدام سريري.",
    placeholder:"مثال: بارفو الكلاب",
    errEmpty:"يرجى إدخال اسم المرض.",
    errApi:"فشل توليد الشرائح. تحقق من الاتصال وحاول مرة أخرى.",
    errParse:"استجابة غير متوقعة من النموذج. حاول مرة أخرى.",
    savedProjects:"المشاريع المحفوظة", noProjects:"لا توجد مشاريع محفوظة بعد.",
    open:"فتح", delete:"حذف", close:"إغلاق",
    step1:"تخطيط العرض…", step2:"توليد الشريحة", step3:"اللمسات الأخيرة…", stepOf:"من",
    slideNames:["العنوان","نظرة عامة","المسبب","الانتقال","الأعراض","الإمراضية","التشخيص","العلاج","الوقاية","حقائق سريعة"]
  }
};

let state = {
  lang:"en",
  mode:"simple",
  disease:"",
  slides:null,
  currentSlide:0,
  pathogenType:null,
};

/* =========================
   Theme palettes by pathogen
========================= */
const PALETTES = {
  viral:        ["#1e3a5f","#0c2340"], // light/dark blue
  bacterial:    ["#2d5a3d","#1a3c2a"], // greens
  parasitic:    ["#6b3a2a","#3a1f17"], // browns
  fungal:       ["#5a4a7a","#2e2444"], // purple
  prion:        ["#4a4a55","#1f1f26"], // gray
  nutritional:  ["#7a5a2a","#3a2a14"], // amber
  toxic:        ["#7a2a3a","#3a141d"], // crimson
  default:      ["#2b3a55","#141d2e"],
};
function paletteFor(type){
  const k = (type||"").toLowerCase();
  for(const key of Object.keys(PALETTES)){
    if(k.includes(key)) return PALETTES[key];
  }
  return PALETTES.default;
}

/* =========================
   API config
========================= */
const NVIDIA_API_URL = "https://integrate.api.nvidia.com/v1/chat/completions";
const NVIDIA_API_KEY = "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";
const NVIDIA_MODEL   = "openai/gpt-oss-120b";

const CORS_PROXIES = [
  null, // try direct first
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://cors-anywhere.herokuapp.com/${url}`,
];

async function callNvidia(prompt){
  const body = {
    model: NVIDIA_MODEL,
    messages: [
      { role:"system", content:"You are a veterinary medicine expert. You output strictly valid JSON with no markdown fencing." },
      { role:"user", content: prompt }
    ],
    temperature: 0.4,
    top_p: 0.9,
    max_tokens: 700,
    stream: false
  };
  const headers = {
    "Content-Type":"application/json",
    "Authorization":`Bearer ${NVIDIA_API_KEY}`,
    "Accept":"application/json"
  };
  let lastErr=null;
  for(let i=0;i<CORS_PROXIES.length;i++){
    const proxy = CORS_PROXIES[i];
    const url = proxy ? proxy(NVIDIA_API_URL) : NVIDIA_API_URL;
    try{
      const res = await fetch(url,{ method:"POST", headers, body: JSON.stringify(body) });
      if(!res.ok){ lastErr = new Error("HTTP "+res.status); continue; }
      const data = await res.json();
      const content = data?.choices?.[0]?.message?.content;
      if(!content){ lastErr = new Error("Empty"); continue; }
      return content;
    }catch(e){ lastErr=e; }
  }
  throw lastErr || new Error("API failed");
}

/* =========================
   Prompt builder
========================= */
const SLIDE_SPECS = [
  { type:"cover",        topic:"Title slide: disease name and a 50-80 word teaser/summary",                              field:"subtitle" },
  { type:"overview",     topic:"Overview: definition, importance and affected species",                                   field:"body" },
  { type:"etiology",     topic:"Etiology: causative agent (taxonomy, family/genus, key biological traits)",               field:"body" },
  { type:"transmission", topic:"Transmission: routes, vectors, reservoirs and risk factors",                              field:"bullets", count:4 },
  { type:"symptoms",     topic:"Clinical signs and symptoms in affected animals",                                          field:"bullets", count:5 },
  { type:"pathogenesis", topic:"Pathogenesis: mechanism of disease, target tissues, immune response",                     field:"body" },
  { type:"diagnosis",    topic:"Diagnosis: clinical, laboratory tests, imaging and differential diagnoses",               field:"bullets", count:4 },
  { type:"treatment",    topic:"Treatment: supportive care, specific therapies, drug classes, dosing principles",         field:"bullets", count:4 },
  { type:"prevention",   topic:"Prevention and control: vaccination, biosecurity, hygiene, quarantine",                   field:"bullets", count:4 },
  { type:"facts",        topic:"Quick veterinary facts: incubation, mortality, zoonotic potential, geographic spread",    field:"bullets", count:5 },
];

function langInstructions(lang){
  if(lang==="ar"){
    return `Write all narrative text in Modern Standard Arabic.
CRITICAL: keep ALL scientific / medical / technical terms in their original English or Latin form (do NOT transliterate). This includes:
- pathogen names (e.g. Canine Parvovirus, Escherichia coli, Mycobacterium bovis)
- drug names (e.g. Amoxicillin, Ivermectin)
- anatomical and physiological terms (e.g. myocardium, lymphocyte)
- laboratory tests (e.g. PCR, ELISA, CBC)
- taxonomy (family, genus, species in Latin)
Wrap each such inline English term in <em class="sci">…</em> tags inside the JSON string values so it renders left-to-right.`;
  }
  return `Write everything in clear English. Use correct scientific and Latin terminology.`;
}

function buildMetaPrompt(disease, lang){
  return `For the animal disease: "${disease}"
Return ONLY a JSON object (no markdown, no commentary):
{
  "diseaseName": "canonical disease name (English)",
  "pathogenType": "one of: viral, bacterial, parasitic, fungal, prion, nutritional, toxic, other",
  "species": "main affected animal species (English)"
}`;
}

function buildSlidePrompt(disease, lang, mode, spec, idx, meta){
  const tone = mode==="scientific"
    ? "Use precise scientific terminology suitable for veterinary students and clinicians."
    : "Use clear, simplified language suitable for animal owners and general learners.";
  const langBlock = langInstructions(lang);
  const shape = spec.field==="bullets"
    ? `{ "title":"short title (max 6 words)", "bullets": [${Array(spec.count).fill('"…"').join(", ")}] }`
    : spec.field==="subtitle"
      ? `{ "title":"the disease name", "subtitle":"50-80 words teaser" }`
      : `{ "title":"short title (max 6 words)", "body":"50-80 words paragraph" }`;
  const wordRule = spec.field==="bullets"
    ? `The SUM of all bullets MUST be 50-80 words. Each bullet ~ ${Math.round(65/spec.count)} words. Count carefully.`
    : `The "${spec.field}" value MUST be a single text of 50-80 words. Count carefully.`;
  return `You are generating slide ${idx+1} of 10 in a veterinary educational deck about: "${disease}".
Disease meta: ${JSON.stringify(meta)}
Slide topic: ${spec.topic}
Style: ${tone}

${langBlock}

Return ONLY valid JSON with this exact shape (no code fences, no commentary):
${shape}

Rules:
- ${wordRule}
- No markdown formatting inside strings (except the allowed <em class="sci">…</em> wrappers for English terms when language is Arabic).
- Be specific and accurate. If the disease is unknown, produce best-effort content.`;
}

function extractJson(text){
  if(!text) return null;
  let t = text.trim();
  // strip code fences
  t = t.replace(/^```(?:json)?\s*/i,"").replace(/```$/,"").trim();
  // find first { and last }
  const a = t.indexOf("{"), b = t.lastIndexOf("}");
  if(a<0||b<0) return null;
  const candidate = t.slice(a,b+1);
  try{ return JSON.parse(candidate); }catch(e){ return null; }
}

/* =========================
   Rendering
========================= */
const $ = s => document.querySelector(s);
const t = k => I18N[state.lang][k] || k;

function applyLang(){
  document.documentElement.lang = state.lang;
  document.body.classList.toggle("rtl", state.lang==="ar");
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const k = el.getAttribute("data-i18n");
    if(I18N[state.lang][k]) el.textContent = I18N[state.lang][k];
  });
  $("#diseaseInput").placeholder = t("placeholder");
  $("#brandName").textContent = t("brand");
  document.querySelectorAll("#langSeg button").forEach(b=>{
    b.classList.toggle("active", b.dataset.lang===state.lang);
  });
}

function setMode(m){
  state.mode = m;
  document.querySelectorAll('[data-mode]').forEach(b=>{
    b.classList.toggle("active", b.dataset.mode===m);
  });
}

function showView(name){
  $("#homeView").style.display    = name==="home"?"flex":"none";
  $("#loadingView").style.display = name==="loading"?"flex":"none";
  $("#editorView").style.display  = name==="editor"?"grid":"none";
  $("#modeSeg").style.display     = name==="editor"?"inline-flex":"none";
  $("#newBtn").style.display      = name==="home"?"none":"inline-flex";
}

function renderSlide(){
  const s = state.slides[state.currentSlide];
  const [c1,c2] = paletteFor(state.pathogenType);
  const isCover = s.type==="cover";
  const container = $("#slideContainer");
  const bullets = Array.isArray(s.bullets)?s.bullets:null;
  const body = s.body || s.subtitle || "";

  container.innerHTML = `
    <div class="slide ${isCover?'cover':''}" id="theSlide" style="--s1:${c1};--s2:${c2}">
      <div class="accent-bar"></div>
      <div class="deco"></div>
      <div class="deco-2"></div>
      <div class="slide-num">${String(state.currentSlide+1).padStart(2,'0')}</div>
      ${isCover ? `
        <div class="kicker">${escapeHtml(state.lang==='ar'?'عرض بيطري تعليمي':'Veterinary Educational Deck')}</div>
        <h2 class="s-title">${safeHtml(s.title||state.disease)}</h2>
        <div class="title-underline"></div>
        ${s.subtitle?`<div class="s-body">${safeHtml(s.subtitle)}</div>`:""}
      ` : `
        <div class="kicker">${escapeHtml(slideKicker(s.type))}</div>
        <h2 class="s-title">${safeHtml(s.title||"")}</h2>
        <div class="title-underline"></div>
        ${bullets ? `<ul class="s-list">${bullets.map(b=>`<li>${safeHtml(b)}</li>`).join("")}</ul>`
                  : `<div class="s-body">${safeHtml(body)}</div>`}
      `}
      <div class="footer-bar">
        <span>${escapeHtml(state.disease)}</span>
        <span>${state.currentSlide+1} / ${state.slides.length}</span>
      </div>
    </div>
  `;
  $("#slideCounter").textContent = `${state.currentSlide+1} / ${state.slides.length}`;
  renderSlideList();
}

function slideKicker(type){
  const map = state.lang==='ar'
    ? {overview:'نظرة عامة',etiology:'المسبب',transmission:'الانتقال',symptoms:'الأعراض',pathogenesis:'الإمراضية',diagnosis:'التشخيص',treatment:'العلاج',prevention:'الوقاية',facts:'حقائق سريعة'}
    : {overview:'Overview',etiology:'Etiology',transmission:'Transmission',symptoms:'Symptoms',pathogenesis:'Pathogenesis',diagnosis:'Diagnosis',treatment:'Treatment',prevention:'Prevention',facts:'Quick Facts'};
  return map[type] || "";
}

function renderSlideList(){
  const list = $("#slideList");
  list.innerHTML = state.slides.map((s,i)=>{
    const name = s.title || I18N[state.lang].slideNames[i] || `Slide ${i+1}`;
    return `<div class="slide-item ${i===state.currentSlide?'active':''}" data-i="${i}">
      <div class="num">${i+1}</div><div class="label">${escapeHtml(name)}</div>
    </div>`;
  }).join("");
  list.querySelectorAll(".slide-item").forEach(el=>{
    el.addEventListener("click",()=>{ state.currentSlide = +el.dataset.i; renderSlide(); });
  });
}

function escapeHtml(s){ return String(s??"").replace(/[&<>"']/g,c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function safeHtml(s){
  // Escape everything, then re-allow <em class="sci">…</em> wrappers for inline LTR scientific terms.
  let out = escapeHtml(s);
  out = out.replace(/&lt;em class=&quot;sci&quot;&gt;/g,'<em class="sci">')
           .replace(/&lt;\/em&gt;/g,'</em>');
  return out;
}

/* =========================
   Generate flow
========================= */
function renderProgressGrid(active, done){
  const grid = $("#progressGrid"); if(!grid) return;
  grid.innerHTML = SLIDE_SPECS.map((_,i)=>{
    const cls = i<done ? "done" : (i===active ? "active" : "");
    return `<div class="progress-cell ${cls}"></div>`;
  }).join("");
}

async function generateSlideWithRetry(disease, lang, mode, spec, idx, meta){
  let lastErr;
  for(let attempt=0; attempt<2; attempt++){
    try{
      const raw = await callNvidia(buildSlidePrompt(disease, lang, mode, spec, idx, meta));
      const parsed = extractJson(raw);
      if(!parsed) { lastErr=new Error("parse"); continue; }
      return Object.assign({ type: spec.type }, parsed);
    }catch(e){ lastErr=e; }
  }
  // Fallback placeholder so the deck stays complete
  return {
    type: spec.type,
    title: spec.type,
    body: spec.field!=="bullets" ? "—" : undefined,
    bullets: spec.field==="bullets" ? Array(spec.count||4).fill("—") : undefined,
    subtitle: spec.field==="subtitle" ? "—" : undefined,
    _error: true
  };
}

async function generateAllSlides(disease, lang, mode){
  // 1) meta
  setStep(t("step1"));
  renderProgressGrid(-1, 0);
  let meta = { diseaseName: disease, pathogenType: "other", species: "" };
  try{
    const raw = await callNvidia(buildMetaPrompt(disease, lang));
    const parsed = extractJson(raw);
    if(parsed) meta = Object.assign(meta, parsed);
  }catch(e){ /* keep defaults */ }

  state.pathogenType = meta.pathogenType || null;
  state.disease = meta.diseaseName || disease;
  state.slides = new Array(SLIDE_SPECS.length).fill(null);

  // 2) fire ALL slide requests in parallel
  let doneCount = 0;
  const total = SLIDE_SPECS.length;
  // mark all as active
  const grid = $("#progressGrid");
  if(grid){
    grid.innerHTML = SLIDE_SPECS.map(()=>`<div class="progress-cell active"></div>`).join("");
  }
  setStep(`${t("step2")} 0 ${t("stepOf")} ${total}…`);

  const tasks = SLIDE_SPECS.map((spec, i) =>
    generateSlideWithRetry(state.disease, lang, mode, spec, i, meta).then(slide => {
      state.slides[i] = slide;
      doneCount++;
      // mark this cell done
      if(grid){
        const cell = grid.children[i];
        if(cell){ cell.classList.remove("active"); cell.classList.add("done"); }
      }
      setStep(`${t("step2")} ${doneCount} ${t("stepOf")} ${total}…`);
      return slide;
    })
  );
  await Promise.all(tasks);
  setStep(t("step3"));
}

async function generate(){
  const disease = $("#diseaseInput").value.trim();
  $("#errorBox").style.display="none";
  if(!disease){ showError(t("errEmpty")); return; }
  state.disease = disease;
  showView("loading");
  try{
    await generateAllSlides(disease, state.lang, state.mode);
    state.currentSlide = 0;
    saveProject();
    showView("editor");
    renderSlide();
  }catch(e){
    showView("home");
    showError(t("errApi"));
  }
}

function setStep(s){ const el=$("#loadStep"); if(el) el.textContent = s; }
function showError(msg){ const b=$("#errorBox"); b.textContent=msg; b.style.display="block"; }

/* =========================
   Projects storage
========================= */
const STORE_KEY = "vetslides_projects_v1";
function loadProjects(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY))||[] }catch{ return [] } }
function saveProject(){
  const projects = loadProjects();
  const item = {
    id: Date.now(),
    disease: state.disease,
    lang: state.lang,
    mode: state.mode,
    pathogenType: state.pathogenType,
    slides: state.slides,
    createdAt: new Date().toISOString()
  };
  projects.unshift(item);
  localStorage.setItem(STORE_KEY, JSON.stringify(projects.slice(0,50)));
}

function openProjectsModal(){
  const projects = loadProjects();
  const wrap = document.createElement("div");
  wrap.className = "modal-back";
  wrap.innerHTML = `
    <div class="modal">
      <header>
        <h3>${escapeHtml(t("savedProjects"))}</h3>
        <button class="btn btn-ghost" id="closeModal">${escapeHtml(t("close"))}</button>
      </header>
      <div class="body">
        ${projects.length===0 ? `<div class="empty-state">${escapeHtml(t("noProjects"))}</div>` :
          projects.map(p=>`
            <div class="proj-item">
              <div>
                <div class="title">${escapeHtml(p.disease)}</div>
                <div class="meta">${new Date(p.createdAt).toLocaleString()} · ${p.slides.length} slides · ${p.lang.toUpperCase()} · ${escapeHtml(p.mode)}</div>
              </div>
              <div style="display:flex;gap:6px">
                <button class="btn" data-open="${p.id}">${escapeHtml(t("open"))}</button>
                <button class="btn btn-danger" data-del="${p.id}">${escapeHtml(t("delete"))}</button>
              </div>
            </div>
          `).join("")}
      </div>
    </div>
  `;
  document.body.appendChild(wrap);
  wrap.addEventListener("click",e=>{ if(e.target===wrap) wrap.remove(); });
  wrap.querySelector("#closeModal").addEventListener("click",()=>wrap.remove());
  wrap.querySelectorAll("[data-open]").forEach(b=>b.addEventListener("click",()=>{
    const id = +b.dataset.open;
    const p = loadProjects().find(x=>x.id===id);
    if(p){
      state.disease=p.disease; state.slides=p.slides; state.pathogenType=p.pathogenType;
      state.lang=p.lang; state.mode=p.mode; state.currentSlide=0;
      applyLang(); setMode(p.mode);
      showView("editor"); renderSlide();
      wrap.remove();
    }
  }));
  wrap.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",()=>{
    const id = +b.dataset.del;
    const projects = loadProjects().filter(p=>p.id!==id);
    localStorage.setItem(STORE_KEY, JSON.stringify(projects));
    wrap.remove(); openProjectsModal();
  }));
}

/* =========================
   Export
========================= */
async function exportPng(){
  const el = document.getElementById("theSlide");
  if(!el) return;
  const fileName = `${(state.disease||'slide').replace(/\s+/g,'_')}_slide_${state.currentSlide+1}.png`;
  try{
    const canvas = await html2canvas(el,{scale:3, backgroundColor:null, useCORS:true, logging:false});
    canvas.toBlob(blob=>{
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.download = fileName; link.href = url;
      document.body.appendChild(link); link.click();
      setTimeout(()=>{ URL.revokeObjectURL(url); link.remove(); },200);
    },"image/png");
  }catch(err){
    // Fallback: SVG foreignObject snapshot
    try{
      const rect = el.getBoundingClientRect();
      const w = Math.ceil(rect.width), h = Math.ceil(rect.height);
      const clone = el.cloneNode(true);
      // inline computed styles for the snapshot
      const serializer = new XMLSerializer();
      const xhtml = serializer.serializeToString(clone);
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w*2}" height="${h*2}" viewBox="0 0 ${w} ${h}"><foreignObject width="100%" height="100%"><div xmlns="http://www.w3.org/1999/xhtml">${xhtml}</div></foreignObject></svg>`;
      const img = new Image();
      img.onload = ()=>{
        const c = document.createElement("canvas");
        c.width = w*2; c.height = h*2;
        c.getContext("2d").drawImage(img,0,0);
        const link = document.createElement("a");
        link.download = fileName; link.href = c.toDataURL("image/png");
        link.click();
      };
      img.src = "data:image/svg+xml;charset=utf-8,"+encodeURIComponent(svg);
    }catch(e2){ alert("Export failed: "+err.message); }
  }
}

/* =========================
   Regenerate on lang/mode change in editor
========================= */
async function regenerateForChange(){
  if(!state.slides) return;
  showView("loading");
  try{
    await generateAllSlides(state.disease, state.lang, state.mode);
    state.currentSlide = 0;
    saveProject();
    showView("editor"); renderSlide();
  }catch(e){
    showView("editor"); renderSlide();
    alert(t("errApi"));
  }
}

/* =========================
   Events
========================= */
$("#generateBtn").addEventListener("click", generate);
$("#diseaseInput").addEventListener("keydown", e=>{ if(e.key==="Enter") generate(); });
$("#openProjects").addEventListener("click", openProjectsModal);
$("#newBtn").addEventListener("click", ()=>{
  state.slides=null; state.disease=""; $("#diseaseInput").value="";
  showView("home");
});
$("#exportBtn") && $("#exportBtn").addEventListener("click", exportPng);
$("#prevBtn").addEventListener("click", ()=>{ if(state.currentSlide>0){state.currentSlide--;renderSlide();}});
$("#nextBtn").addEventListener("click", ()=>{ if(state.currentSlide<state.slides.length-1){state.currentSlide++;renderSlide();}});

document.querySelectorAll("#langSeg button").forEach(b=>b.addEventListener("click",()=>{
  const newLang = b.dataset.lang;
  if(newLang===state.lang) return;
  state.lang = newLang; applyLang();
  if(state.slides) regenerateForChange();
}));
document.querySelectorAll("#modeSeg button, #modeSegHome button").forEach(b=>b.addEventListener("click",()=>{
  const m = b.dataset.mode;
  if(m===state.mode && !state.slides) { setMode(m); return; }
  setMode(m);
  if(state.slides) regenerateForChange();
}));

applyLang();
setMode("simple");
</script>
