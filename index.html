<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>زيد حامد</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Arabic:wght@400;700&family=Tajawal:wght@200;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0f1012;
            --text: #e2e2e2;
            --accent: #d4af37; /* لمسة ذهبية خفيفة للفخامة */
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 20px;
            background-image: radial-gradient(circle at center, #1a1b1e 0%, #0f1012 100%);
        }

        .container {
            width: 100%;
            max-width: 440px;
            animation: fadeIn 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 50px 20px;
            text-align: center;
            backdrop-filter: blur(15px);
            margin-bottom: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .img-container {
            position: relative;
            width: 120px; height: 120px;
            margin: 0 auto 30px;
        }

        .profile-img {
            width: 100%; height: 100%;
            border-radius: 40% 60% 70% 30% / 40% 50% 50% 60%;
            object-fit: cover;
            border: 1px solid var(--border);
            transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .profile-card:hover .profile-img {
            border-radius: 50%;
            transform: scale(1.05) rotate(-3deg);
            border-color: var(--accent);
        }

        .name {
            font-family: 'Noto Serif Arabic', serif;
            font-size: 2.4rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #fff;
        }

        .sub-name {
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 200;
        }

        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-item {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 22px 30px;
            border-radius: 20px;
            text-decoration: none;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(212, 175, 55, 0.3);
            transform: translateX(-8px);
        }

        .link-text {
            font-weight: 500;
            font-size: 1.05rem;
        }

        .link-item i {
            font-size: 1.2rem;
            opacity: 0.6;
            transition: 0.3s;
        }

        .link-item:hover i {
            opacity: 1;
            color: var(--accent);
            transform: scale(1.2);
        }

        .poetry-footer {
            margin-top: 50px;
            text-align: center;
            font-family: 'Noto Serif Arabic', serif;
            font-size: .75rem;
            color: #555;
            line-height: 1.8;
            
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="profile-card">
            <div class="img-container">
                <img src="https://raw.githubusercontent.com/Zie0d/mylove/refs/heads/main/IMG_3495.jpg" alt="زيد" class="profile-img">
            </div>
            <h1 class="name">زيد حامد</h1>
            <div class="sub-name">@ZIE0D1</div>
        </header>

        <nav class="links-stack">
            <a href="https://t.me/zie0d1" class="link-item">
                <span class="link-text">تيليجرام</span>
                <i class="fa-brands fa-telegram"></i>
            </a>
            <a href="https://instagram.com/zie0d1" class="link-item">
                <span class="link-text">إنستغرام</span>
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://wa.me/9647736308670" class="link-item">
                <span class="link-text">واتساب</span>
                <i class="fa-brands fa-whatsapp"></i>
            </a>
            <a href="mailto:zy0aid@gmail.com" class="link-item">
                <span class="link-text">البريد الإلكتروني</span>
                <i class="fa-regular fa-envelope"></i>
            </a>
        </nav>

        
    </div>

</body>
</html>
