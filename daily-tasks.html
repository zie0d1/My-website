<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>today's tasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --ink: #111111;
    --muted: #999999;
    --rule: #e8e8e8;
    --check: #111111;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 80px 24px 120px;
  }

  header {
    width: 100%;
    max-width: 560px;
    margin-bottom: 64px;
  }

  .date {
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(28px, 5vw, 40px);
    font-weight: 400;
    line-height: 1.1;
    letter-spacing: -0.01em;
  }

  h1 em {
    font-style: italic;
    color: var(--muted);
  }

  /* Task list */
  .task-list {
    width: 100%;
    max-width: 560px;
    list-style: none;
  }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 18px 0;
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    user-select: none;
  }

  .task-item.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .task-item:first-child {
    border-top: 1px solid var(--rule);
  }

  .task-num {
    font-size: 10px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.08em;
    padding-top: 3px;
    min-width: 20px;
    flex-shrink: 0;
  }

  .task-text {
    font-size: 14px;
    font-weight: 400;
    line-height: 1.55;
    flex: 1;
    transition: color 0.2s ease;
  }

  .task-check {
    width: 16px;
    height: 16px;
    border: 1px solid var(--rule);
    flex-shrink: 0;
    margin-top: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s ease, background 0.2s ease;
  }

  .task-item.done .task-text {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: var(--rule);
  }

  .task-item.done .task-check {
    background: var(--ink);
    border-color: var(--ink);
  }

  .task-check svg {
    opacity: 0;
    transition: opacity 0.15s ease;
  }

  .task-item.done .task-check svg {
    opacity: 1;
  }

  /* Loading state */
  .loading {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .skeleton {
    height: 55px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0;
  }

  .skeleton:first-child { border-top: 1px solid var(--rule); }

  .skel-num {
    width: 14px;
    height: 8px;
    background: var(--rule);
    flex-shrink: 0;
  }

  .skel-line {
    height: 8px;
    background: var(--rule);
    flex: 1;
    animation: pulse 1.4s ease-in-out infinite;
  }

  .skel-line:nth-child(2) { animation-delay: 0.1s; max-width: 80%; }
  .skel-line:nth-child(3) { animation-delay: 0.2s; max-width: 60%; }
  .skel-line:nth-child(4) { animation-delay: 0.3s; max-width: 70%; }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* Progress */
  .progress-bar-wrap {
    width: 100%;
    max-width: 560px;
    margin-top: 40px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .progress-bar {
    flex: 1;
    height: 1px;
    background: var(--rule);
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--ink);
    width: 0%;
    transition: width 0.4s ease;
  }

  .progress-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    white-space: nowrap;
    min-width: 48px;
    text-align: right;
  }

  /* Regenerate */
  .regen-btn {
    margin-top: 48px;
    background: none;
    border: 1px solid var(--rule);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 20px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }

  .regen-btn:hover {
    color: var(--ink);
    border-color: var(--ink);
  }

  .regen-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* Error */
  .error-msg {
    width: 100%;
    max-width: 560px;
    font-size: 12px;
    color: var(--muted);
    padding: 24px 0;
    border-top: 1px solid var(--rule);
    display: none;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="date" id="dateLabel"></div>
  <h1>ten things to do<br><em>today.</em></h1>
</header>

<div class="loading" id="loadingState">
  <div class="skeleton" style="animation-delay:0s"><div class="skel-num"></div><div class="skel-line"></div></div>
  <div class="skeleton" style="animation-delay:.07s"><div class="skel-num"></div><div class="skel-line"></div></div>
  <div class="skeleton" style="animation-delay:.14s"><div class="skel-num"></div><div class="skel-line"></div></div>
  <div class="skeleton" style="animation-delay:.21s"><div class="skel-num"></div><div class="skel-line"></div></div>
  <div class="skeleton" style="animation-delay:.28s"><div class="skel-num"></div><div class="skel-line"></div></div>
  <div class="skeleton" style="animation-delay:.35s"><div class="skel-num"></div><div class="skel-line"></div></div>
  <div class="skeleton" style="animation-delay:.42s"><div class="skel-num"></div><div class="skel-line"></div></div>
  <div class="skeleton" style="animation-delay:.49s"><div class="skel-num"></div><div class="skel-line"></div></div>
  <div class="skeleton" style="animation-delay:.56s"><div class="skel-num"></div><div class="skel-line"></div></div>
  <div class="skeleton" style="animation-delay:.63s"><div class="skel-num"></div><div class="skel-line"></div></div>
</div>

<ul class="task-list hidden" id="taskList"></ul>

<div class="progress-bar-wrap hidden" id="progressWrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">0 / 10</div>
</div>

<div class="error-msg" id="errorMsg"></div>

<button class="regen-btn hidden" id="regenBtn" onclick="generate()">regenerate</button>

<script>
const NV_API_KEY  = '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';
const NV_MODEL    = 'openai/gpt-oss-120b';
const NV_ENDPOINT = 'https://integrate.api.nvidia.com/v1/chat/completions';
const CORS_PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://cors-anywhere.herokuapp.com/${url}`,
];

// Date
const d = new Date();
document.getElementById('dateLabel').textContent =
  d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

let completed = 0;

async function fetchWithProxy(body) {
  const direct = await fetch(NV_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${NV_API_KEY}` },
    body: JSON.stringify(body)
  }).catch(() => null);
  if (direct && direct.ok) return direct;

  for (const proxy of CORS_PROXIES) {
    const url = proxy(NV_ENDPOINT);
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${NV_API_KEY}` },
      body: JSON.stringify(body)
    }).catch(() => null);
    if (res && res.ok) return res;
  }
  throw new Error('All proxies failed');
}

async function generate() {
  completed = 0;
  const list = document.getElementById('taskList');
  const loading = document.getElementById('loadingState');
  const progressWrap = document.getElementById('progressWrap');
  const regen = document.getElementById('regenBtn');
  const err = document.getElementById('errorMsg');

  list.classList.add('hidden');
  progressWrap.classList.add('hidden');
  loading.classList.remove('hidden');
  err.style.display = 'none';
  regen.disabled = true;
  list.innerHTML = '';
  updateProgress(0);

  const prompt = `Generate exactly 10 unique, actionable daily tasks focused on self-improvement, personal growth, social connection, or life experience. Tasks should be small, achievable today, and varied. Mix physical, social, creative, and reflective activities. Examples: "Write down 3 things you are grateful for", "Take a 10-minute walk without your phone", "Send a genuine compliment to someone you know".

Return ONLY a JSON array of 10 strings. No numbering, no markdown, no explanation. Just the raw JSON array.`;

  try {
    const res = await fetchWithProxy({
      model: NV_MODEL,
      messages: [{ role: 'user', content: prompt }],
      temperature: 0.9,
      max_tokens: 1024,
      top_p: 1.0
    });

    const data = await res.json();
    const raw = data.choices?.[0]?.message?.content || '';
    const clean = raw.replace(/```json|```/g, '').trim();
    const tasks = JSON.parse(clean);

    loading.classList.add('hidden');
    list.classList.remove('hidden');
    progressWrap.classList.remove('hidden');
    regen.classList.remove('hidden');
    regen.disabled = false;

    tasks.slice(0, 10).forEach((task, i) => {
      const li = document.createElement('li');
      li.className = 'task-item';
      li.innerHTML = `
        <span class="task-num">${String(i + 1).padStart(2, '0')}</span>
        <span class="task-text">${task}</span>
        <div class="task-check">
          <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
            <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>`;
      li.onclick = () => toggle(li);
      list.appendChild(li);
      setTimeout(() => li.classList.add('visible'), i * 60);
    });

    updateProgress(0);

  } catch (e) {
    loading.classList.add('hidden');
    regen.classList.remove('hidden');
    regen.disabled = false;
    err.style.display = 'block';
    err.textContent = 'Could not load tasks. Check your connection and try again.';
  }
}

function toggle(li) {
  const wasDone = li.classList.contains('done');
  li.classList.toggle('done');
  completed += wasDone ? -1 : 1;
  updateProgress(completed);
}

function updateProgress(n) {
  const total = 10;
  document.getElementById('progressFill').style.width = `${(n / total) * 100}%`;
  document.getElementById('progressLabel').textContent = `${n} / ${total}`;
}

generate();
</script>
</body>
</html>
