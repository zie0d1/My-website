<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مهام اليوم</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --ink: #111111;
    --muted: #999999;
    --rule: #e8e8e8;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 24px 120px;
    direction: rtl;
  }

  header {
    width: 100%;
    max-width: 560px;
    margin-bottom: 40px;
  }

  .date {
    font-weight: 300;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  h1 {
    font-size: clamp(24px, 4.5vw, 36px);
    font-weight: 300;
    line-height: 1.3;
  }

  h1 em {
    font-style: normal;
    font-weight: 500;
    color: var(--muted);
  }

  /* Category tag */
  .task-category {
    font-size: 10px;
    font-weight: 400;
    color: var(--muted);
    border: 1px solid var(--rule);
    padding: 2px 7px;
    flex-shrink: 0;
    margin-top: 5px;
    white-space: nowrap;
  }

  /* Task list */
  .task-list {
    width: 100%;
    max-width: 560px;
    list-style: none;
  }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 16px 0;
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    user-select: none;
  }

  .task-item.visible { opacity: 1; transform: translateY(0); }
  .task-item:first-child { border-top: 1px solid var(--rule); }

  .task-num {
    font-size: 11px;
    font-weight: 300;
    color: var(--muted);
    padding-top: 3px;
    min-width: 18px;
    flex-shrink: 0;
    text-align: center;
  }

  .task-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .task-text {
    font-size: 15px;
    font-weight: 400;
    line-height: 1.65;
    transition: color 0.2s ease;
  }

  .task-check {
    width: 16px;
    height: 16px;
    border: 1px solid var(--rule);
    flex-shrink: 0;
    margin-top: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s ease, background 0.2s ease;
  }

  .task-item.done .task-text {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: var(--rule);
  }

  .task-item.done .task-category { opacity: 0.4; }

  .task-item.done .task-check {
    background: var(--ink);
    border-color: var(--ink);
  }

  .task-check svg { opacity: 0; transition: opacity 0.15s ease; }
  .task-item.done .task-check svg { opacity: 1; }

  /* Loading */
  .loading {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
  }

  .skeleton {
    height: 62px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .skeleton:first-child { border-top: 1px solid var(--rule); }

  .skel-num { width: 14px; height: 8px; background: var(--rule); flex-shrink: 0; }

  .skel-block { display: flex; flex-direction: column; gap: 7px; flex: 1; }

  .skel-line {
    height: 8px;
    background: var(--rule);
    animation: pulse 1.4s ease-in-out infinite;
  }

  .skel-line.long  { max-width: 78%; animation-delay: 0.05s; }
  .skel-line.short { max-width: 32%; animation-delay: 0.15s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.35; }
    50% { opacity: 1; }
  }

  /* Progress */
  .progress-bar-wrap {
    width: 100%;
    max-width: 560px;
    margin-top: 36px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .progress-bar { flex: 1; height: 1px; background: var(--rule); overflow: hidden; }

  .progress-fill {
    height: 100%;
    background: var(--ink);
    width: 0%;
    transition: width 0.4s ease;
  }

  .progress-label {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    min-width: 44px;
    text-align: left;
  }

  /* Regen */
  .regen-btn {
    margin-top: 44px;
    background: none;
    border: 1px solid var(--rule);
    color: var(--muted);
    font-family: 'Tajawal', sans-serif;
    font-size: 13px;
    font-weight: 400;
    padding: 9px 22px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }

  .regen-btn:hover { color: var(--ink); border-color: var(--ink); }
  .regen-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .error-msg {
    width: 100%;
    max-width: 560px;
    font-size: 13px;
    color: var(--muted);
    padding: 20px 0;
    border-top: 1px solid var(--rule);
    display: none;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="date" id="dateLabel"></div>
  <h1>عشرة أشياء تفعلها<br><em>اليوم.</em></h1>
</header>

<div class="loading" id="loadingState">
  <div class="skeleton"><div class="skel-num"></div><div class="skel-block"><div class="skel-line long"></div><div class="skel-line short"></div></div></div>
  <div class="skeleton"><div class="skel-num"></div><div class="skel-block"><div class="skel-line long"></div><div class="skel-line short"></div></div></div>
  <div class="skeleton"><div class="skel-num"></div><div class="skel-block"><div class="skel-line long"></div><div class="skel-line short"></div></div></div>
  <div class="skeleton"><div class="skel-num"></div><div class="skel-block"><div class="skel-line long"></div><div class="skel-line short"></div></div></div>
  <div class="skeleton"><div class="skel-num"></div><div class="skel-block"><div class="skel-line long"></div><div class="skel-line short"></div></div></div>
  <div class="skeleton"><div class="skel-num"></div><div class="skel-block"><div class="skel-line long"></div><div class="skel-line short"></div></div></div>
  <div class="skeleton"><div class="skel-num"></div><div class="skel-block"><div class="skel-line long"></div><div class="skel-line short"></div></div></div>
  <div class="skeleton"><div class="skel-num"></div><div class="skel-block"><div class="skel-line long"></div><div class="skel-line short"></div></div></div>
  <div class="skeleton"><div class="skel-num"></div><div class="skel-block"><div class="skel-line long"></div><div class="skel-line short"></div></div></div>
  <div class="skeleton"><div class="skel-num"></div><div class="skel-block"><div class="skel-line long"></div><div class="skel-line short"></div></div></div>
</div>

<ul class="task-list hidden" id="taskList"></ul>

<div class="progress-bar-wrap hidden" id="progressWrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">٠ / ١٠</div>
</div>

<div class="error-msg" id="errorMsg"></div>
<button class="regen-btn hidden" id="regenBtn" onclick="generate()">توليد جديد</button>

<script>
const NV_API_KEY  = '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';
const NV_MODEL    = 'openai/gpt-oss-120b';
const NV_ENDPOINT = 'https://integrate.api.nvidia.com/v1/chat/completions';
const CORS_PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://cors-anywhere.herokuapp.com/${url}`,
];

const ARABIC_NUMS = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
function toAr(n) { return String(n).split('').map(d => ARABIC_NUMS[+d] ?? d).join(''); }

// Storage key: one set per calendar date
function todayKey() {
  const d = new Date();
  return `tasks_${d.getFullYear()}_${d.getMonth()+1}_${d.getDate()}`;
}

function saveToday(tasks, done) {
  localStorage.setItem(todayKey(), JSON.stringify({ tasks, done }));
}

function loadToday() {
  try { return JSON.parse(localStorage.getItem(todayKey())); } catch { return null; }
}

// Date label
const d = new Date();
document.getElementById('dateLabel').textContent =
  d.toLocaleDateString('ar-SA', { weekday: 'long', month: 'long', day: 'numeric' });

let completed = 0;
let currentTasks = []; // [{text, category}]
let doneState = [];    // [bool x10]

async function fetchWithProxy(body) {
  const direct = await fetch(NV_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${NV_API_KEY}` },
    body: JSON.stringify(body)
  }).catch(() => null);
  if (direct && direct.ok) return direct;

  for (const proxy of CORS_PROXIES) {
    const url = proxy(NV_ENDPOINT);
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${NV_API_KEY}` },
      body: JSON.stringify(body)
    }).catch(() => null);
    if (res && res.ok) return res;
  }
  throw new Error('All proxies failed');
}

async function generate(forceNew = false) {
  // Try loading saved tasks for today first
  if (!forceNew) {
    const saved = loadToday();
    if (saved && saved.tasks && saved.tasks.length === 10) {
      renderTasks(saved.tasks, saved.done || new Array(10).fill(false));
      return;
    }
  }

  completed = 0;
  const list = document.getElementById('taskList');
  const loading = document.getElementById('loadingState');
  const progressWrap = document.getElementById('progressWrap');
  const regen = document.getElementById('regenBtn');
  const err = document.getElementById('errorMsg');

  list.classList.add('hidden');
  progressWrap.classList.add('hidden');
  loading.classList.remove('hidden');
  err.style.display = 'none';
  regen.disabled = true;
  list.innerHTML = '';
  updateProgress(0);

  const prompt = `اكتب بالعربية بالضبط ١٠ مهام يومية متنوعة وعملية. لكل مهمة حدد فئتها من هذه الفئات فقط: صحة، علاقات، تطوير الذات، إبداع، تجربة جديدة، تأمل.

المهام يجب أن تكون صغيرة وقابلة للتنفيذ خلال اليوم. وزّع المهام على الفئات المختلفة.

أعد فقط مصفوفة JSON تحتوي على ١٠ كائنات بهذا الشكل بالضبط:
[{"text": "نص المهمة", "category": "الفئة"}, ...]

بدون markdown، بدون شرح. فقط المصفوفة الخام.`;

  try {
    const res = await fetchWithProxy({
      model: NV_MODEL,
      messages: [{ role: 'user', content: prompt }],
      temperature: 0.9,
      max_tokens: 1500,
      top_p: 1.0
    });

    const data = await res.json();
    const raw = data.choices?.[0]?.message?.content || '';
    const clean = raw.replace(/```json|```/g, '').trim();
    const tasks = JSON.parse(clean);

    const normalized = tasks.slice(0, 10).map(t =>
      typeof t === 'string' ? { text: t, category: '' } : { text: t.text || t, category: t.category || '' }
    );

    const done = new Array(normalized.length).fill(false);
    saveToday(normalized, done);
    renderTasks(normalized, done);

  } catch (e) {
    loading.classList.add('hidden');
    regen.classList.remove('hidden');
    regen.disabled = false;
    err.style.display = 'block';
    err.textContent = 'تعذّر تحميل المهام. تحقق من اتصالك وحاول مجدداً.';
  }
}

function renderTasks(tasks, done) {
  currentTasks = tasks;
  doneState = [...done];
  completed = doneState.filter(Boolean).length;

  const list = document.getElementById('taskList');
  const loading = document.getElementById('loadingState');
  const progressWrap = document.getElementById('progressWrap');
  const regen = document.getElementById('regenBtn');

  loading.classList.add('hidden');
  list.classList.remove('hidden');
  progressWrap.classList.remove('hidden');
  regen.classList.remove('hidden');
  regen.disabled = false;
  list.innerHTML = '';

  tasks.forEach((task, i) => {
    const li = document.createElement('li');
    li.className = 'task-item' + (doneState[i] ? ' done' : '');
    li.dataset.index = i;
    li.innerHTML = `
      <span class="task-num">${toAr(i + 1)}</span>
      <div class="task-body">
        <span class="task-text">${task.text}</span>
        ${task.category ? `<span class="task-category">${task.category}</span>` : ''}
      </div>
      <div class="task-check">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
          <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>`;
    li.onclick = () => toggle(li);
    list.appendChild(li);
    setTimeout(() => li.classList.add('visible'), i * 55);
  });

  updateProgress(completed);
}

function toggle(li) {
  const i = parseInt(li.dataset.index);
  const wasDone = li.classList.contains('done');
  li.classList.toggle('done');
  doneState[i] = !wasDone;
  completed = doneState.filter(Boolean).length;
  saveToday(currentTasks, doneState);
  updateProgress(completed);
}

function updateProgress(n) {
  const total = 10;
  document.getElementById('progressFill').style.width = `${(n / total) * 100}%`;
  document.getElementById('progressLabel').textContent = `${toAr(n)} / ${toAr(total)}`;
}

// On regen button click → force new generation
document.getElementById('regenBtn').onclick = () => generate(true);

generate(false);
</script>
</body>
</html>
